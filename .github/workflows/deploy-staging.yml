name: Deploy to Staging
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            bhuvanachin/farmaze-dashboard:staging
            bhuvanachin/farmaze-dashboard:staging-${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_ANALYTICS_API_URL=${{ secrets.VITE_ANALYTICS_API_URL }}
            VITE_AGENT_API_URL=${{ secrets.VITE_AGENT_API_URL }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          cache-from: type=registry,ref=bhuvanachin/farmaze-dashboard:cache
          cache-to: type=inline

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.CORE_HOST }}
          username: root
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull bhuvanachin/farmaze-dashboard:staging
            cd /opt/farmaze && docker compose -f docker-compose.core.yml up -d dashboard
            echo "Waiting for health check..."
            for i in $(seq 1 10); do
              sleep 5
              STATE=$(docker inspect --format='{{.State.Health.Status}}' farmaze-dashboard 2>/dev/null || echo 'starting')
              if [ "$STATE" = "healthy" ]; then echo "Healthy!"; exit 0; fi
              echo "Attempt $i/10: $STATE"
            done
            echo "Health check failed"; exit 1
