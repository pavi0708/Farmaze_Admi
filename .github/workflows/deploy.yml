name: Deploy Freshflow Dashboard to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger option

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.BACKEND_API_URL }}

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --env VITE_API_URL=${{ secrets.BACKEND_API_URL }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  monitoring:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment health
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Check if the frontend is accessible
            curl -f http://localhost:80 || echo "Health check failed but continuing"
            # Check Nginx logs for any errors
            tail -n 50 /var/log/nginx/error.log | grep -i error || echo "No critical errors found in Nginx logs"
