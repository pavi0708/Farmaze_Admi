name: Sync to Farmaze Org

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Farmaze org
        run: |
          git remote add org https://x-access-token:${{ secrets.ORG_PUSH_TOKEN }}@github.com/Farmaze/freshflow-dashboard.git
          git push org main --force
